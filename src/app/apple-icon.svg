<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="180" height="180" rx="40" fill="url(#grad1)"/>
  
  <!-- AI 芯片/网关图标 -->
  <!-- 中心方形 -->
  <rect x="60" y="60" width="60" height="60" rx="6" fill="white" opacity="0.9"/>
  
  <!-- 四个角的连接点 -->
  <circle cx="60" cy="60" r="5" fill="white"/>
  <circle cx="120" cy="60" r="5" fill="white"/>
  <circle cx="60" cy="120" r="5" fill="white"/>
  <circle cx="120" cy="120" r="5" fill="white"/>
  
  <!-- 连接线 -->
  <!-- 左上 -->
  <line x1="60" y1="60" x2="25" y2="25" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 右上 -->
  <line x1="120" y1="60" x2="155" y2="25" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 左下 -->
  <line x1="60" y1="120" x2="25" y2="155" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 右下 -->
  <line x1="120" y1="120" x2="155" y2="155" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 中心 AI 标识 -->
  <text x="90" y="105" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#6366f1" text-anchor="middle">AI</text>
</svg>
