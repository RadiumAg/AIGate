<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>
  
  <!-- AI 芯片/网关图标 -->
  <!-- 中心方形 -->
  <rect x="44" y="44" width="40" height="40" rx="4" fill="white" opacity="0.9"/>
  
  <!-- 四个角的连接点 -->
  <circle cx="44" cy="44" r="3" fill="white"/>
  <circle cx="84" cy="44" r="3" fill="white"/>
  <circle cx="44" cy="84" r="3" fill="white"/>
  <circle cx="84" cy="84" r="3" fill="white"/>
  
  <!-- 连接线 -->
  <!-- 左上 -->
  <line x1="44" y1="44" x2="20" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- 右上 -->
  <line x1="84" y1="44" x2="108" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- 左下 -->
  <line x1="44" y1="84" x2="20" y2="108" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- 右下 -->
  <line x1="84" y1="84" x2="108" y2="108" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 中心 AI 标识 -->
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6366f1" text-anchor="middle">AI</text>
</svg>
